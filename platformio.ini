; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
build_flags = -Wall -Wextra
	!python git_rev_macro.py

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps =
	teckel12/NewPing@^1.9.4
	arduino-libraries/Servo@^1.1.8

test_speed = 9600
test_testing_command =
    simavr
    -m
    atmega2560
    -f
    16000000L
    ${platformio.build_dir}/${this.__env__}/firmware.elf

; Runs the hardware-independent unit tests on the host compiler, with no AVR
; toolchain or simavr involved. Anything that needs an ArduinoXxx/UltraSound-
; Sensor hardware implementation (i.e. the real firmware, built by the
; megaatmega2560 env) can't run here - this only exercises the platform-
; independent logic (lib/Control, lib/Battery, lib/Telemetry, decoding in
; lib/Communication, etc). This is also the acid test for future ports: if a
; module doesn't build here, it isn't actually platform-independent yet.
[env:native]
platform = native
