name: Build

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Install simavr
        run: sudo apt-get install -y simavr

      - name: Build firmware
        run: pio run

      - name: Run tests on the native platform
        run: pio test --without-uploading

      - name: Run static code analysis
        run: pio check --skip-packages

      - name: Install clang-format
        run: pip install clang-format==22.1.5

      - name: Check code formatting
        run: |
          find lib src test -regextype posix-extended -regex '.*\.(cpp|h)$' -print0 \
            | xargs -0 clang-format --dry-run -Werror
